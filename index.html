<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StandupAI — Auto-generate your daily standup v2.0</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap&v=2.0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 50%);
      animation: rotate 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInDown 0.6s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560 0%, #ff6b9d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #a0a0b0;
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.6;
    }

    /* Enhanced animations and effects */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
      50% { box-shadow: 0 12px 48px rgba(233, 69, 96, 0.25); }
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Enhanced cards */
    .card {
      background: rgba(26, 26, 46, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      margin-bottom: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.8s ease-out;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.1), transparent);
      transition: left 0.6s;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      border-color: rgba(233, 69, 96, 0.6);
      box-shadow: 0 20px 60px rgba(233, 69, 96, 0.2);
      transform: translateY(-4px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      border-color: rgba(233, 69, 96, 0.4);
      box-shadow: 0 12px 48px rgba(233, 69, 96, 0.15);
    }

    /* Enhanced section titles */
    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #e94560;
      margin-bottom: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .section-title::before {
      content: '';
      width: 6px;
      height: 20px;
      background: linear-gradient(180deg, #e94560 0%, #ff6b9d 100%);
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(233, 69, 96, 0.5), transparent);
    }

    /* Form elements */
    label {
      display: block;
      font-size: 0.875rem;
      color: #b0b0c0;
      margin-bottom: 8px;
      margin-top: 20px;
      font-weight: 500;
    }

    label:first-of-type { margin-top: 0; }

    input, textarea {
      width: 100%;
      background: rgba(15, 15, 26, 0.6);
      border: 1px solid rgba(233, 69, 96, 0.2);
      border-radius: 10px;
      color: #e0e0e0;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #e94560;
      background: rgba(15, 15, 26, 0.8);
      box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
    }

    input::placeholder, textarea::placeholder {
      color: #606070;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    /* Enhanced buttons */
    .btn {
      margin-top: 28px;
      width: 100%;
      background: linear-gradient(135deg, #e94560 0%, #ff6b9d 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.6s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.6);
    }

    .btn:active {
      transform: translateY(-1px) scale(0.98);
    }

    .btn:disabled {
      background: linear-gradient(135deg, #3a3a4a 0%, #2a2a3a 100%);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn:disabled::before {
      display: none;
    }

    /* Activity items */
    .activity-item {
      background: rgba(15, 15, 26, 0.6);
      border-left: 3px solid #e94560;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 0.9rem;
      color: #d0d0d0;
      transition: all 0.2s ease;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .activity-item:hover {
      background: rgba(15, 15, 26, 0.8);
      transform: translateX(4px);
    }

    .activity-item strong {
      color: #e94560;
      font-weight: 600;
    }

    .activity-item span {
      color: #808090;
      font-size: 0.8rem;
      display: block;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Output */
    #output-text {
      background: rgba(15, 15, 26, 0.6);
      border: 1px solid rgba(233, 69, 96, 0.2);
      border-radius: 10px;
      padding: 20px;
      font-size: 0.95rem;
      line-height: 1.8;
      white-space: pre-wrap;
      min-height: 100px;
      font-family: 'Inter', monospace;
    }

    .copy-btn {
      margin-top: 12px;
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: #e94560;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.3);
    }

    /* Error */
    .error {
      color: #ff6b9d;
      font-size: 0.875rem;
      margin-top: 12px;
      padding: 12px;
      background: rgba(233, 69, 96, 0.1);
      border-radius: 8px;
      border-left: 3px solid #e94560;
    }

    .hidden { display: none; }

    /* Loader */
    .loader {
      text-align: center;
      color: #888;
      padding: 16px;
      font-size: 0.9rem;
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      text-align: center;
      color: #606070;
      font-size: 0.875rem;
    }

    .footer a {
      color: #e94560;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #ff6b9d;
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 { font-size: 2.25rem; }
      .subtitle { font-size: 1rem; }
      .card { padding: 24px; }
      body { padding: 40px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 StandupAI</h1>
      <p class="subtitle">Auto-generate your daily standup from GitHub activity.<br>Never forget what you did yesterday.</p>
    </div>

  <!-- Step 1: Input -->
  <div class="card">
    <div class="section-title">Step 1 — Your Info</div>

    <label>GitHub Username</label>
    <input type="text" id="username" placeholder="e.g. sahilsaeidkhan" />

    <label>Repository Name</label>
    <input type="text" id="repo" placeholder="e.g. GDE (leave blank for all repos)" />

    <label>Date (default: yesterday)</label>
    <input type="date" id="date" />

    <label>Paste 2–3 of your old standup messages (so we match your tone)</label>
    <textarea id="examples" placeholder="e.g.&#10;- Worked on auth flow, fixed token refresh bug&#10;- Reviewed PR for dashboard, left comments&#10;- Closed 2 issues related to login page"></textarea>

    <button class="btn" id="fetch-btn" onclick="fetchActivity()">Fetch My Activity</button>
    <p class="error hidden" id="error-msg"></p>
  </div>

  <!-- Step 2: Activity Preview -->
  <div class="card hidden" id="activity-card">
    <div class="section-title">Step 2 — Yesterday's Activity</div>
    <div id="activity-list"></div>
    <button class="btn" onclick="generateStandup()">Generate Standup ✨</button>
  </div>

  <!-- Step 3: Output -->
  <div class="card hidden" id="output-card">
    <div class="section-title">Step 3 — Your Standup</div>
    <div id="output-text"></div>
    <button class="copy-btn" onclick="copyStandup()">📋 Copy to Clipboard</button>
  </div>

  <div class="footer">
    Made with ❤️ for developers who forget what they did yesterday | <a href="productivity.html" style="color: #e94560; text-decoration: none;">Try ProductivityAI →</a>
  </div>
  </div>

<script>
  // Set default date to yesterday
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  document.getElementById('date').value = yesterday.toISOString().split('T')[0];

  let activityData = [];

  async function fetchActivity() {
    const username = document.getElementById('username').value.trim();
    const repo = document.getElementById('repo').value.trim();
    const date = document.getElementById('date').value;
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('fetch-btn');

    errEl.classList.add('hidden');
    if (!username) { showError('Please enter your GitHub username.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Fetching...';
    activityData = [];

    try {
      const since = date + 'T00:00:00Z';
      const until = date + 'T23:59:59Z';

      const headers = { 'Accept': 'application/vnd.github.cloak-preview+json' };

      // Fetch commits - use repo API if repo specified, otherwise search
      if (repo) {
        // Direct repo API - more reliable for specific repos
        const commitRes = await fetch(
          `https://api.github.com/repos/${username}/${repo}/commits?author=${username}&since=${since}&until=${until}&per_page=50`,
          { headers }
        );
        const commitData = await commitRes.json();
        if (Array.isArray(commitData)) {
          commitData.forEach(c => {
            activityData.push({
              type: 'commit',
              text: c.commit.message.split('\n')[0],
              repo: repo
            });
          });
        }
      } else {
        // Search API for all repos - use author-date instead of committer-date
        const commitRes = await fetch(
          `https://api.github.com/search/commits?q=author:${username}+author-date:${date}&per_page=50&sort=author-date&order=desc`,
          { headers }
        );
        const commitData = await commitRes.json();
        if (commitData.items) {
          commitData.items.forEach(c => {
            activityData.push({
              type: 'commit',
              text: c.commit.message.split('\n')[0],
              repo: c.repository.name
            });
          });
        }
      }

      // Fetch PRs opened
      const prRes = await fetch(
        `https://api.github.com/search/issues?q=author:${username}+type:pr+created:${date}${repo ? '+repo:'+username+'/'+repo : ''}&per_page=30`
      );
      const prData = await prRes.json();
      if (prData.items) {
        prData.items.forEach(p => {
          activityData.push({ type: 'pr_opened', text: p.title, repo: p.repository_url.split('/').pop() });
        });
      }

      // Fetch PRs reviewed (commented on)
      const reviewRes = await fetch(
        `https://api.github.com/search/issues?q=commenter:${username}+type:pr+updated:${date}${repo ? '+repo:'+username+'/'+repo : ''}&per_page=30`
      );
      const reviewData = await reviewRes.json();
      if (reviewData.items) {
        reviewData.items.forEach(p => {
          if (p.user.login !== username) { // not their own PR
            activityData.push({ type: 'pr_reviewed', text: p.title, repo: p.repository_url.split('/').pop() });
          }
        });
      }

      // Fetch issues closed/commented
      const issueRes = await fetch(
        `https://api.github.com/search/issues?q=involves:${username}+type:issue+updated:${date}${repo ? '+repo:'+username+'/'+repo : ''}&per_page=30`
      );
      const issueData = await issueRes.json();
      if (issueData.items) {
        issueData.items.forEach(i => {
          activityData.push({
            type: i.state === 'closed' ? 'issue_closed' : 'issue_commented',
            text: i.title,
            repo: i.repository_url.split('/').pop()
          });
        });
      }

      if (activityData.length === 0) {
        showError('No activity found for that date. Try a different date or check the username.');
        btn.disabled = false;
        btn.textContent = 'Fetch My Activity';
        return;
      }

      renderActivity();
    } catch (e) {
      showError('Failed to fetch from GitHub. Check your username and try again.');
    }

    btn.disabled = false;
    btn.textContent = 'Fetch My Activity';
  }

  function renderActivity() {
    const list = document.getElementById('activity-list');
    const icons = { commit: '💾', pr_opened: '🔀', pr_reviewed: '👀', issue_closed: '✅', issue_commented: '💬' };
    const labels = { commit: 'Commit', pr_opened: 'PR Opened', pr_reviewed: 'PR Reviewed', issue_closed: 'Issue Closed', issue_commented: 'Issue Comment' };

    list.innerHTML = activityData.map(a => `
      <div class="activity-item">
        ${icons[a.type]} <strong>${labels[a.type]}</strong> — ${a.text}
        <span>${a.repo}</span>
      </div>
    `).join('');

    document.getElementById('activity-card').classList.remove('hidden');
    document.getElementById('activity-card').scrollIntoView({ behavior: 'smooth' });
  }

  async function generateStandup() {
    const examples = document.getElementById('examples').value.trim();
    const date = document.getElementById('date').value;
    const outputCard = document.getElementById('output-card');
    const outputText = document.getElementById('output-text');

    // Show loading state
    outputCard.classList.remove('hidden');
    outputText.innerHTML = '<span class="spinner"></span> Generating your standup with AI...';
    outputCard.scrollIntoView({ behavior: 'smooth' });

    // Group activity
    const commits = activityData.filter(a => a.type === 'commit');
    const prsOpened = activityData.filter(a => a.type === 'pr_opened');
    const prsReviewed = activityData.filter(a => a.type === 'pr_reviewed');
    const issuesClosed = activityData.filter(a => a.type === 'issue_closed');
    const issuesCommented = activityData.filter(a => a.type === 'issue_commented');

    // Build activity summary
    let activitySummary = '';
    if (commits.length > 0) {
      const msgs = [...new Set(commits.map(c => c.text))].slice(0, 5);
      activitySummary += `Commits (${commits.length}): ${msgs.join('; ')}\n`;
    }
    if (prsOpened.length > 0) {
      activitySummary += `PRs Opened: ${prsOpened.map(p => p.text).join(', ')}\n`;
    }
    if (prsReviewed.length > 0) {
      activitySummary += `PRs Reviewed: ${prsReviewed.map(p => p.text).join(', ')}\n`;
    }
    if (issuesClosed.length > 0) {
      activitySummary += `Issues Closed: ${issuesClosed.map(i => i.text).join(', ')}\n`;
    }
    if (issuesCommented.length > 0) {
      activitySummary += `Issues Commented: ${issuesCommented.map(i => i.text).slice(0,3).join(', ')}\n`;
    }

    // Create prompt for AI
    const prompt = `You are a helpful assistant that writes daily standup messages for developers.

Here are examples of the user's previous standup messages (to match their tone and style):
${examples || 'No examples provided - use a professional but casual tone.'}

Here is their GitHub activity from yesterday (${date}):
${activitySummary}

Generate a concise standup message that:
1. Matches the user's tone and style from their examples
2. Summarizes their activity naturally (don't just list everything)
3. Groups similar work together
4. Keeps it brief and readable
5. Ends with a simple "Today: [continuing/next steps]" line

Output only the standup message, nothing else.`;

    try {
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer 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',
          'HTTP-Referer': window.location.href,
          'X-Title': 'StandupAI'
        },
        body: JSON.stringify({
          model: 'google/gemini-2.0-flash-exp:free',
          messages: [
            {
              role: 'user',
              content: prompt
            }
          ],
          temperature: 0.7,
          max_tokens: 500
        })
      });

      if (!response.ok) {
        throw new Error('API request failed');
      }

      const data = await response.json();
      const generatedStandup = data.choices[0].message.content.trim();

      outputText.textContent = generatedStandup;
    } catch (error) {
      console.error('AI generation failed:', error);
      
      // Fallback to rule-based generation
      const useBullets = !examples || examples.includes('-') || examples.includes('•');
      const casual = examples && (examples.toLowerCase().includes('worked on') || examples.toLowerCase().includes('fixed'));

      let lines = [];

      if (commits.length > 0) {
        const msgs = [...new Set(commits.map(c => c.text))].slice(0, 4);
        if (casual) lines.push(`Worked on: ${msgs.join(', ')}`);
        else lines.push(`Pushed ${commits.length} commit(s): ${msgs.join('; ')}`);
      }
      if (prsOpened.length > 0) {
        lines.push(`Opened PR${prsOpened.length > 1 ? 's' : ''}: ${prsOpened.map(p => p.text).join(', ')}`);
      }
      if (prsReviewed.length > 0) {
        lines.push(`Reviewed PR${prsReviewed.length > 1 ? 's' : ''}: ${prsReviewed.map(p => p.text).join(', ')}`);
      }
      if (issuesClosed.length > 0) {
        lines.push(`Closed issue${issuesClosed.length > 1 ? 's' : ''}: ${issuesClosed.map(i => i.text).join(', ')}`);
      }
      if (issuesCommented.length > 0) {
        lines.push(`Commented on issue${issuesCommented.length > 1 ? 's' : ''}: ${issuesCommented.map(i => i.text).slice(0,2).join(', ')}`);
      }

      const formatted = useBullets
        ? lines.map(l => `- ${l}`).join('\n')
        : lines.join('\n');

      const output = `Yesterday (${date}):\n${formatted}\n\nToday: Continuing from where I left off.`;

      outputText.textContent = output + '\n\n(Note: AI generation unavailable, using fallback)';
    }
  }

  function copyStandup() {
    const text = document.getElementById('output-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('hidden');
  }
</script>
</body>
</html>
